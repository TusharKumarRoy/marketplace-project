<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Marketplace</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/orders.css}">
</head>
<body>
<div class="container">
    <header th:replace="~{fragments/header :: siteHeader('My Cart')}"></header>
    <nav th:replace="~{fragments/header :: roleNav('buyer-cart')}"></nav>

    <main class="orders-shell">
        <div class="orders-header">
            <h2>Cart Items</h2>
            <a th:href="@{/products}" class="btn btn-secondary">Continue Shopping</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <table class="orders-table" th:if="${!#lists.isEmpty(checkoutItems)}">
            <thead>
            <tr>
                <th>Product</th>
                <th>Unit Price</th>
                <th>Quantity</th>
                <th>Line Total</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${checkoutItems}">
                <td th:text="${item.name}">Product</td>
                <td th:text="${'$' + #numbers.formatDecimal(item.price, 1, 2)}">$0.00</td>
                <td>
                    <form th:action="@{/cart/update}" method="post" style="display: flex; gap: 8px; align-items: center;">
                        <input type="hidden" name="productId" th:value="${item.productId}">
                        <input type="number" name="qty" min="1" th:max="${item.maxQty}" th:value="${item.qty}" style="width: 74px;">
                        <button type="submit" class="btn btn-small btn-secondary">Update</button>
                    </form>
                </td>
                <td th:text="${'$' + #numbers.formatDecimal(item.lineTotal, 1, 2)}">$0.00</td>
                <td>
                    <form th:action="@{/cart/remove}" method="post" style="display: inline;">
                        <input type="hidden" name="productId" th:value="${item.productId}">
                        <button type="submit" class="btn btn-small">Remove</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="empty-state" th:if="${#lists.isEmpty(checkoutItems)}">
            <span class="empty-state-icon">&#128722;</span>
            <h3>Your cart is empty</h3>
            <p>Add products to cart to proceed with checkout.</p>
            <a th:href="@{/products}" class="btn btn-primary">Browse Products</a>
        </div>

        <div th:if="${!#lists.isEmpty(checkoutItems)}" style="margin-top: 20px; display: flex; justify-content: flex-end;">
            <div style="min-width: 320px;">
                <div class="checkout-row"><span>Subtotal</span><strong th:text="${'$' + #numbers.formatDecimal(subtotal, 1, 2)}">$0.00</strong></div>
                <div class="checkout-row"><span>Shipping</span><strong th:text="${'$' + #numbers.formatDecimal(shipping, 1, 2)}">$0.00</strong></div>
                <div class="checkout-row total-row"><span>Total</span><strong th:text="${'$' + #numbers.formatDecimal(total, 1, 2)}">$0.00</strong></div>
                <div style="margin-top: 12px; text-align: right;">
                    <a th:href="@{/orders/checkout}" class="btn btn-primary">Proceed to Checkout</a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: siteFooter}"></footer>
</div>
</body>
</html>
