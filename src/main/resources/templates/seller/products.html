<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Seller</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/products.css}">
</head>
<body>
<div class="container">
    <header th:replace="~{fragments/header :: siteHeader('Seller Product Management')}"></header>
    <nav th:replace="~{fragments/header :: roleNav('seller-products')}"></nav>

    <main>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="page-header">
            <h2>My Products</h2>
            <a th:href="@{/seller/products/new}" class="btn btn-primary">Add Product</a>
        </div>

        <div class="products-toolbar">
            <form th:action="@{/seller/products/search}" method="get" class="search-box" data-auto-trim-search>
                <span class="search-icon">&#128269;</span>
                <input type="text" name="q" placeholder="Search your products..." th:value="${searchQuery}">
            </form>
        </div>

        <div th:if="${#lists.isEmpty(products)}" class="empty-state">
            <span class="empty-state-icon">&#128230;</span>
            <h3>No products yet</h3>
            <p>Start by adding your first product.</p>
            <a th:href="@{/seller/products/new}" class="btn btn-primary">Create Product</a>
        </div>

        <div th:if="${!#lists.isEmpty(products)}" class="orders-table">
            <table class="products-table">
                <thead>
                <tr>
                    <th>Product</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td>
                        <strong th:text="${product.name}">Name</strong>
                        <div style="font-size: 12px; color: #777;" th:text="${product.sellerUsername}"></div>
                    </td>
                    <td th:text="${product.category}">Category</td>
                    <td th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}">$0.00</td>
                    <td>
                        <span th:if="${product.stock > 10}" class="badge badge-in-stock" th:text="${product.stock}"></span>
                        <span th:if="${product.stock > 0 and product.stock <= 10}" class="badge badge-low-stock" th:text="${product.stock}"></span>
                        <span th:if="${product.stock <= 0}" class="badge badge-out-of-stock">Out</span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-small btn-secondary">View</a>
                        <a th:href="@{/seller/products/{id}/edit(id=${product.id})}" class="btn btn-small btn-primary">Edit</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: siteFooter}"></footer>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
