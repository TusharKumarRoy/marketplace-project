<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? 'Edit Product' : 'Add Product'">Product Form</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/products.css}">
</head>
<body>
<div class="container">
    <header th:replace="~{fragments/header :: siteHeader(${isEdit} ? 'Edit Product' : 'Add Product')}"></header>
    <nav th:replace="~{fragments/header :: roleNav('seller-products')}"></nav>

    <main>
        <section class="product-form-wrapper">
            <h2 th:text="${isEdit} ? 'Update Product' : 'Create New Product'">Create New Product</h2>

            <div th:if="${submitError}" class="alert alert-error" th:text="${submitError}"></div>

            <form class="product-form" th:action="${formAction}" method="post" th:object="${product}">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Product Name</label>
                        <input id="name" type="text" th:field="*{name}" required>
                        <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <input id="category" type="text" th:field="*{category}" required>
                        <span class="field-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price</label>
                        <input id="price" type="number" step="0.01" min="0.01" th:field="*{price}" required>
                        <span class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
                    </div>
                    <div class="form-group">
                        <label for="stock">Stock</label>
                        <input id="stock" type="number" min="0" th:field="*{stock}" required>
                        <span class="field-error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="imageUrl">Image URL</label>
                    <input id="imageUrl" type="url" th:field="*{imageUrl}" placeholder="https://...">
                    <span class="field-error" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></span>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}" required></textarea>
                    <span class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
                </div>

                <div class="form-actions">
                    <a th:href="@{/seller/products}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Save Changes' : 'Create Product'">Create Product</button>
                </div>
            </form>
        </section>
    </main>

    <footer th:replace="~{fragments/footer :: siteFooter}"></footer>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
