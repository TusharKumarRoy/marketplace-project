<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buyer Dashboard - Marketplace</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Buyer Dashboard</h1>
            <div class="user-info">
                <span th:text="${username}">Username</span>
                <a th:href="@{/logout}" class="btn btn-secondary">Logout</a>
            </div>
        </header>
        
        <main>
            <div class="welcome-section">
                <h2>Welcome to Marketplace</h2>
                <p>Browse products and manage your orders.</p>
            </div>
            
            <div class="dashboard-cards">
                <div class="card">
                    <h3>Browse Products</h3>
                    <p>Explore available products</p>
                    <a href="#" class="btn btn-primary">Shop Now</a>
                </div>
                
                <div class="card">
                    <h3>My Orders</h3>
                    <p>Track your order history</p>
                    <a href="#" class="btn btn-primary">View Orders</a>
                </div>
                
                <div class="card">
                    <h3>Cart</h3>
                    <p>View your shopping cart</p>
                    <a href="#" class="btn btn-primary">View Cart</a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
