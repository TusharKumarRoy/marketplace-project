<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Marketplace</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/products.css}">
</head>
<body>
<div class="container">
    <header th:replace="~{fragments/header :: siteHeader('Browse Products')}"></header>
    <nav th:replace="~{fragments/header :: roleNav('products')}"></nav>

    <main>
        <div class="products-toolbar">
            <form th:action="@{/products}" method="get" class="search-box" data-auto-trim-search>
                <span class="search-icon">&#128269;</span>
                <input type="text" name="q" placeholder="Search by product name..." th:value="${searchQuery}">
            </form>

            <form th:action="@{/products}" method="get">
                <select name="category" class="filter-select" onchange="this.form.submit()">
                    <option value="">All Categories</option>
                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"
                            th:selected="${selectedCategory == cat}"></option>
                </select>
            </form>
        </div>

        <div th:if="${#lists.isEmpty(products)}" class="empty-state">
            <span class="empty-state-icon">&#128722;</span>
            <h3>No products found</h3>
            <p>Try a different keyword or category.</p>
        </div>

        <div class="products-grid" th:if="${!#lists.isEmpty(products)}">
            <th:block th:each="product : ${products}">
                <div th:replace="~{fragments/product-card :: productCard(product=${product})}"></div>
            </th:block>
        </div>
    </main>

    <footer th:replace="~{fragments/footer :: siteFooter}"></footer>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
