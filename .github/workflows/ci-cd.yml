name: CI/CD Pipeline

on:
  push:
    branches-ignore:
      - main
      - develop
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_db_test
          POSTGRES_USER: marketplace_user
          POSTGRES_PASSWORD: marketplace_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/marketplace_db_test
          SPRING_DATASOURCE_USERNAME: marketplace_user
          SPRING_DATASOURCE_PASSWORD: marketplace_pass
        run: mvn test -B

      - name: Package application
        run: mvn package -DskipTests -B

      - name: Build summary
        run: |
          echo "###Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "- Java Version: 21" >> $GITHUB_STEP_SUMMARY
          echo "- Maven Build: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo " **Render will auto-deploy from main branch**" >> $GITHUB_STEP_SUMMARY
